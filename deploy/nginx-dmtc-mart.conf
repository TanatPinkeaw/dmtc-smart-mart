# ⭐️ DEPLOY — nginx site config สำหรับ DMTC Mart
# วางไฟล์นี้ที่ /etc/nginx/sites-available/dmtc-mart แล้ว symlink ไป sites-enabled/
# (ดูขั้นตอนใน DEPLOY.md)
#
# หน้าที่ของ nginx ตรงนี้:
#   1. เสิร์ฟไฟล์ frontend ที่ build แล้ว (โฟลเดอร์ dist)
#   2. พ่น request /api/ และ /socket.io/ ไปให้ backend Node ที่พอร์ต 3000
#   3. บังคับ HTTPS (redirect http -> https)

# ---- HTTP: redirect ไป HTTPS อย่างเดียว ----
server {
    listen 80;
    server_name _;            # ใส่ IP หรือโดเมนของเครื่องแทน _ ก็ได้ เช่น 192.168.1.50
    return 301 https://$host$request_uri;
}

# ---- HTTPS: ตัวจริง ----
server {
    listen 443 ssl;
    server_name _;            # ใส่ IP/โดเมนของเครื่อง

    # ใบรับรอง SSL — self-signed (ดูวิธีสร้างใน DEPLOY.md) หรือ Let's Encrypt ถ้ามีโดเมน
    ssl_certificate     /etc/nginx/ssl/dmtc-mart.crt;
    ssl_certificate_key /etc/nginx/ssl/dmtc-mart.key;

    # อัปโหลดสลิป/รูปเข้างานได้สูงสุด 10 MB (ตรงกับ limit ฝั่ง backend)
    client_max_body_size 10M;

    # 1. Frontend (ไฟล์ static ที่ build แล้ว)
    root /var/www/dmtc-mart;
    index index.html;

    # SPA: ทุก path ที่ไม่ใช่ไฟล์จริง ให้ตกมาที่ index.html (React Router จัดการ route เอง)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. API -> backend Node
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Socket.io (realtime) — ต้องมี header upgrade ให้ websocket ทำงาน
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
